name: Build Mod

on:
  push:
    branches: [ "main", "master" ] # Đổi lại theo tên branch của bạn
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: |
        # Chạy build với Java 17 nhưng ép target về Java 8 thông qua Toolchain
        ./gradlew build --no-daemon --info --stacktrace \
          -Porg.gradle.java.installations.auto-download=true \
          -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mod-Jar-File
        path: build/libs/*.jar
